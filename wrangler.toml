name = "dolly-bot"
main = "src/index.ts"
compatibility_date = "2024-09-23"

[vars]
PARTNER_ORG_CATEGORY_ID = "1506346523053527231"
VERIFY_CHANNEL_ID = "1514163672296194098"

[observability]
enabled = true

[observability.logs]
enabled = true
invocation_logs = true

[[kv_namespaces]]
binding = "COOLDOWN_KV"
id = "595397d464094d2eafb0752477ebfaeb"
preview_id = "ce5a8552577f4f43836a3317af1ac839"

[[kv_namespaces]]
binding = "VERIFY_KV"
id = "1073b77beefd4df4acd49d9769a31247"
preview_id = "f8c06cc6432f4f30a5c9094ef02ce17a"

[[d1_databases]]
binding = "VERIFY_DB"
database_name = "dolly-bot-verify"
database_id = "dc74448d-2815-4cf9-85b1-02d2110d276a"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "AUDIT_BUCKET"
bucket_name = "dolly-bot-audits"

[triggers]
crons = ["0 6 * * 1"]

[[services]]
binding = "WORKER_SELF"
service = "dolly-bot"

[[routes]]
pattern = "dolly-bot.scanz.space"
custom_domain = true
